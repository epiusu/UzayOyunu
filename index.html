<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Web Awesome -->


<!-- Optional CSS reset ("Native Styles") -->


  <title>Uzay Oyunları | Ana Menü</title>
  <style>
    :root { --bg: #050a14; --blue: #00f2ff; --blue-glow: 0 0 15px #00f2ff; --panel: rgba(10, 20, 40, 0.85); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: #e0e8f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .space-bg {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background: radial-gradient(ellipse at center, #1a2a5a 0%, #050a14 70%);
    }
    .stars { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .star { position: absolute; background: white; border-radius: 50%; opacity: 0.8; animation: twinkle 3s infinite alternate; }
    @keyframes twinkle { 0% { opacity: 0.3; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }
    .network-lines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15;
      background-image: linear-gradient(var(--blue) 1px, transparent 1px), linear-gradient(90deg, var(--blue) 1px, transparent 1px);
      background-size: 50px 50px;
      animation: drift 20s linear infinite;
    }
    @keyframes drift { 0% { transform: translate(0,0); } 100% { transform: translate(50px, 50px); } }
    
    .container { text-align: center; background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid rgba(0,242,255,0.3); box-shadow: var(--blue-glow); max-width: 500px; width: 90%; }
    h1 { font-size: 2.2rem; margin-bottom: 8px; text-shadow: var(--blue-glow); letter-spacing: 3px; }
    .subtitle { color: #8aa4c7; margin-bottom: 25px; font-size: 0.95rem; }
    .btn-grid { display: flex; flex-direction: column; gap: 12px; }
    .game-btn {
      background: linear-gradient(135deg, rgba(0,242,255,0.1), rgba(0,100,200,0.2));
      border: 1px solid var(--blue); color: var(--blue); padding: 16px; border-radius: 12px; font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: 0.3s; text-decoration: none; display: block;
    }
    .game-btn:hover { background: var(--blue); color: #050a14; box-shadow: var(--blue-glow); transform: translateY(-3px); }
    .scoreboard {
      margin-top: 25px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; font-size: 0.9rem;
    }
    .scoreboard div { margin: 5px 0; color: #8aa4c7; }
    .scoreboard span { color: var(--blue); font-weight: bold; }
    .footer { margin-top: 20px; font-size: 0.75rem; color: #5a7096; }
  </style>
</head>
<body>
  <div class="space-bg">
    <div class="stars" id="stars"></div>
    <div class="network-lines"></div>
  </div>
  <div class="container">
    <h1><i class="fa-brands fa-space-awesome"></i> UZAY OYUNLARI</h1>
    <div class="subtitle">strateji · iki kişilik · sınırsız </div>
    <div class="btn-grid">
      <a href="uzay-yarisi.html" class="game-btn">🛸 UZAY YARIŞI OYNA</a>
      <a href="go.html" class="game-btn">🌀 GO OYNA</a>
      <a href="tertis.html" class="game-btn">✖️ TERTİS OYNA</a>
      <a href="harita-ülke-bul.html" class="game-btn">🌍 HARİTA OYUNU OYNA</a>
    </div>
    <div class="scoreboard">
      <div> Tertiz: <span id="menu-t-x">0</span> (X) | <span id="menu-t-o">0</span> (O)</div>
      <div> Go: <span id="menu-g-s">0</span> (Siyah) | <span id="menu-g-w">0</span> (Beyaz)</div>
      <div> Uzay Yarışı: <span id="menu-uzay">0</span> (En Yüksek)</div>
    </div>
    <div class="footer">⭐ Skorlar tarayıcıda kalıcıdır</div>
  </div>
  <script>
    const container = document.getElementById('stars');
    for(let i=0; i<80; i++){
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random()*100 + '%';
      star.style.top = Math.random()*100 + '%';
      star.style.width = star.style.height = (Math.random()*2+1) + 'px';
      star.style.animationDelay = (Math.random()*3) + 's';
      container.appendChild(star);
    }
    // Skorları yükle
    const t = JSON.parse(localStorage.getItem('tertis_scores'))||{x:0,o:0};
    const g = JSON.parse(localStorage.getItem('go_scores'))||{b:0,w:0};
    const u = localStorage.getItem('uzay_highscore')||0;
    document.getElementById('menu-t-x').textContent = t.x;
    document.getElementById('menu-t-o').textContent = t.o;
    document.getElementById('menu-g-s').textContent = g.b;
    document.getElementById('menu-g-w').textContent = g.w;
    document.getElementById('menu-uzay').textContent = u;
  </script>
</body>
</html>
